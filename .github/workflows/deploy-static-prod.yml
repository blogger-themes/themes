name: Deploy static (production)

on:
  push:
    branches:
      - release

jobs:
  publish:
    name: Build and Deploy
    runs-on: [ubuntu-latest]
    permissions:
      contents: write
    strategy:
      matrix:
        node-version: ["22.x"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Use pnpm
        uses: pnpm/action-setup@v5
      - name: Use Node ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build app
        run: pnpm run build
        env:
          VITE_BASE: https://cdn.jsdelivr.net/gh/${{ github.repository }}@release-${{ github.sha }}/
      - name: Deploy to static-prod branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: static-prod
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_message: Deploy static assets from release branch
          tag_name: release-${{ github.sha }}
          tag_message: Deployment for ${{ github.sha }}
          publish_dir: ./dist
