name: Publish static (development)

on:
  push:
    branches:
      - development

jobs:
  publish:
    name: Build and Publish
    runs-on: [ubuntu-latest]
    permissions:
      contents: write
    strategy:
      matrix:
        node-version: ["22.x"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Use pnpm
        uses: pnpm/action-setup@v5
      - name: Use Node ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build app
        run: pnpm run build
        env:
          VITE_BASE: https://cdn.jsdelivr.net/gh/${{ github.repository }}@static-dev/
      - name: Publish assets to static-dev branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: static-dev
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_message: Publish static assets from development branch
          publish_dir: ./dist

  purge:
    name: Purge JsDelivr files
    needs: [publish]
    runs-on: [ubuntu-latest]
    steps:
      - name: Checkout static-dev branch
        uses: actions/checkout@v6
        with:
          ref: static-dev
          fetch-depth: 2
      - name: Install curl
        run: |
          sudo apt-get update
          sudo apt-get install -y curl
      - name: Send purge requests to JsDelivr for changed files
        run: |
          if git rev-parse HEAD^ >/dev/null 2>&1; then
              changed_files=$(git diff --name-only HEAD^ HEAD)
          else
              changed_files=$(git ls-tree -r --name-only HEAD)
          fi

          if [ -z "$changed_files" ]; then
            echo "No files changed. Skipping purge."
            exit 0
          fi

          for file in $changed_files; do
            url="https://purge.jsdelivr.net/gh/${{ github.repository }}@static-dev/$file"
            echo "Purging $url"
            curl -sS "$url" &
          done

          wait
          echo -e "\nAll purge requests for changed files have been sent."
