name: Dev static assets

on:
  push:
    branches:
      - development

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  PUBLISH_REPOSITORY: ${{ github.repository }}
  PUBLISH_BRANCH: static-dev

jobs:
  publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Use Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build themes and generate output
        run: |
          set -e

          : "${REPOSITORY:?Missing REPOSITORY environment variable}"
          : "${VERSION:?Missing VERSION environment variable}"

          OUTPUT_DIR=".output"
          METADATA_FILE="$OUTPUT_DIR/metadata.json"
          README_FILE="$OUTPUT_DIR/README.md"
          CDN_BASE="https://cdn.jsdelivr.net/gh/$REPOSITORY@$(printf '%s' "$VERSION" | jq -sRr @uri)/"

          metadata_json=$(
            jq -n \
              --arg repository "$REPOSITORY" \
              --arg version "$VERSION" \
              --arg base "$CDN_BASE" \
              '{
                repository: $repository,
                version: $version,
                base: $base,
                themes: []
              }'
          )

          rm -rf "$OUTPUT_DIR"
          mkdir -p "$OUTPUT_DIR"

          for dir in themes/*; do
            if [ ! -f "$dir/package.json" ]; then
              continue
            fi

            read -r name version description < <(
              jq -r 'select(.name and .version) | [.name, .version, (.description // "")] | @tsv' "$dir/package.json"
            ) || continue

            base_name="$(basename "$dir")"
            vite_base="${CDN_BASE}${base_name}/"

            VITE_BASE="$vite_base" pnpm exec turbo run build --filter="$name"

            src="$dir/dist"

            if [ ! -d "$src" ]; then
              continue
            fi

            dest="$OUTPUT_DIR/$base_name"

            rm -rf "$dest"
            mkdir -p "$dest"
            cp -r "$src/." "$dest/"

            metadata_json=$(
              printf '%s' "$metadata_json" |
                jq \
                  --arg name "$name" \
                  --arg description "$description" \
                  --arg version "$version" \
                  --arg directory "$base_name" \
                  --arg base "$vite_base" \
                  '.themes += [{
                    name: $name,
                    version: $version
                  } + (if $description != "" then {description: $description} else {} end) + {
                    directory: $directory,
                    base: $base
                  }]'
            )
          done

          echo "$metadata_json" >"$METADATA_FILE"

          theme_count=$(printf '%s' "$metadata_json" | jq '.themes | length')

          if [ "$theme_count" -gt 0 ]; then
            {
              echo "## Themes"
              echo ""
              echo "| Name | Version | Directory |"
              echo "|------|---------|-----------|"
              printf '%s' "$metadata_json" | jq -r '
                .themes[] |
                "| `\(.name)` | `\(.version)` |`\(.directory)` |"
              '
            } > "$README_FILE"
          fi
        env:
          REPOSITORY: ${{ env.PUBLISH_REPOSITORY }}
          VERSION: ${{ env.PUBLISH_BRANCH }}

      - name: Publish assets to ${{ env.PUBLISH_REPOSITORY }}@${{ env.PUBLISH_BRANCH }}
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
          external_repository: ${{ case(env.PUBLISH_REPOSITORY != github.repository, env.PUBLISH_REPOSITORY, '') }}
          publish_branch: ${{ env.PUBLISH_BRANCH }}
          full_commit_message: "chore: publish static assets (${{ github.sha }})"
          publish_dir: ./.output

  purge:
    name: Purge JsDelivr files
    needs: [publish]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ${{ env.PUBLISH_REPOSITORY }}@${{ env.PUBLISH_BRANCH }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ env.PUBLISH_REPOSITORY }}
          ref: ${{ env.PUBLISH_BRANCH }}
          fetch-depth: 2

      - name: Install curl
        run: |
          sudo apt-get update
          sudo apt-get install -y curl

      - name: Send purge requests to JsDelivr for changed files
        run: |
          if git rev-parse HEAD^ >/dev/null 2>&1; then
              changed_files=$(git diff --name-only HEAD^ HEAD)
          else
              changed_files=$(git ls-tree -r --name-only HEAD)
          fi

          if [ -z "$changed_files" ]; then
            echo "No files changed. Skipping purge."
            exit 0
          fi

          for file in $changed_files; do
            url="https://purge.jsdelivr.net/gh/${{ env.PUBLISH_REPOSITORY }}@$(printf '%s' "${{ env.PUBLISH_BRANCH }}" | jq -sRr @uri)/$file"
            echo "Purging $url"
            curl -sS "$url" &
          done

          wait
          echo -e "\nAll purge requests for changed files have been sent."
